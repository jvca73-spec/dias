<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud de Día 227</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
h1 { background:#1976d2; color:white; padding:15px; margin:0; font-size:18px; }

input, select, button, textarea {
    width:90%; padding:10px; margin:5px;
}

.calendar {
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:2px; padding:5px;
}

.day {
    background:white;
    min-height:80px;
    padding:5px;
    font-size:12px;
}

.note { font-size:11px; }
.owner { font-size:9px; color:gray; }

#editor {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:15px;
    display:none;
}
</style>
</head>

<body>

<h1>SOLICITUD DE DIA 227</h1>

<div id="login">
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="register()">Registro</button>
    <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
    <button onclick="logout()">Salir</button>

    <select id="month"></select>
    <select id="year"></select>

    <div id="calendar" class="calendar"></div>
</div>

<div id="editor">
    <h3 id="dateText"></h3>
    <textarea id="note"></textarea>
    <button onclick="saveNote()">Guardar</button>
</div>

<script>
// 🔥 PEGA AQUÍ TU CONFIG
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let user = null;
let selectedDate = null;

// LOGIN
function register(){
    auth.createUserWithEmailAndPassword(email.value, pass.value);
}

function login(){
    auth.signInWithEmailAndPassword(email.value, pass.value);
}

function logout(){
    auth.signOut();
}

auth.onAuthStateChanged(u=>{
    if(u){
        user = u.email;
        login.style.display="none";
        app.style.display="block";
        render();
    } else {
        login.style.display="block";
        app.style.display="none";
    }
});

// CALENDARIO
const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
months.forEach((m,i)=>month.innerHTML+=`<option value="${i}">${m}</option>`);
for(let y=2024;y<=2035;y++) year.innerHTML+=`<option>${y}</option>`;

function render(){
    calendar.innerHTML="";
    let y=+year.value;
    let m=+month.value;

    let start=(new Date(y,m,1).getDay()+6)%7;
    let days=new Date(y,m+1,0).getDate();

    for(let i=0;i<start;i++) calendar.innerHTML+="<div></div>";

    for(let d=1;d<=days;d++){
        let key=`${y}-${m}-${d}`;

        let div=document.createElement("div");
        div.className="day";
        div.innerHTML=`<b>${d}</b><div id="${key}"></div>`;

        div.onclick=()=>openEditor(key,d,m,y);

        calendar.appendChild(div);

        // 🔄 tiempo real
        db.collection("notes").doc(key)
        .onSnapshot(doc=>{
            let data=doc.data();
            let html="";
            if(data){
                data.notes.forEach(n=>{
                    html+=`<div class="note">${n.text}</div>
                           <div class="owner">${n.user}</div>`;
                });
            }
            document.getElementById(key).innerHTML=html;
        });
    }
}

function openEditor(key,d,m,y){
    selectedDate=key;
    dateText.innerText=`${d}/${m+1}/${y}`;
    note.value="";
    editor.style.display="block";
}

async function saveNote(){
    let ref=db.collection("notes").doc(selectedDate);

    let doc=await ref.get();

    let notes=[];
    if(doc.exists) notes=doc.data().notes;

    let index=notes.findIndex(n=>n.user===user);

    if(index!==-1){
        notes[index].text=note.value;
    }else{
        notes.push({user:user,text:note.value});
    }

    await ref.set({notes:notes});
    editor.style.display="none";
}

// eventos
month.onchange=render;
year.onchange=render;
</script>

</body>
</html>
